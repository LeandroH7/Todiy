<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TODIY 1.0</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Exo+2:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:         #050a12;
  --blue:       #4fc3f7;
  --blue-dim:   rgba(79,195,247,0.18);
  --purple:     #a855f7;
  --cyan:       #00e5ff;
  --glow-b:     rgba(79,195,247,0.4);
  --glow-p:     rgba(168,85,247,0.4);
  --text:       #e0eaf5;
  --text-dim:   rgba(180,210,240,0.5);
}

html, body {
  width:100%; height:100%;
  background: var(--bg);
  font-family: 'Exo 2', sans-serif;
  color: var(--text);
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* grid de pontos */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image: radial-gradient(circle at 1px 1px, rgba(79,195,247,0.1) 1px, transparent 0);
  background-size: 28px 28px;
  pointer-events:none; z-index:0;
}

/* ── SCAN LINE ─────────────────────── */
.scan-line {
  position:fixed; left:0; right:0; height:1.5px;
  background: linear-gradient(90deg, transparent, var(--cyan) 40%, var(--purple) 60%, transparent);
  opacity:0; z-index:2; pointer-events:none;
  animation: scanAnim 9s ease-in-out infinite;
}
@keyframes scanAnim {
  0%   { top:4%;  opacity:0; }
  5%   { opacity:0.2; }
  95%  { opacity:0.2; }
  100% { top:91%; opacity:0; }
}

/* ── HUD CANTOS ────────────────────── */
.hud-c {
  position:fixed; width:50px; height:50px;
  pointer-events:none; z-index:1; opacity:0.3;
}
.hud-c.tl { top:56px; left:14px;
  border-top:1.5px solid var(--blue); border-left:1.5px solid var(--blue); }
.hud-c.tr { top:56px; right:14px;
  border-top:1.5px solid var(--blue); border-right:1.5px solid var(--blue); }
.hud-c.bl { bottom:112px; left:14px;
  border-bottom:1.5px solid var(--purple); border-left:1.5px solid var(--purple); }
.hud-c.br { bottom:112px; right:14px;
  border-bottom:1.5px solid var(--purple); border-right:1.5px solid var(--purple); }

/* ── MINI CHART ────────────────────── */
.mini-chart {
  position:fixed; right:10px; bottom:150px;
  display:flex; align-items:flex-end; gap:2px;
  opacity:0.28; pointer-events:none; z-index:1;
}
.mini-chart span {
  width:4px; background:var(--blue); border-radius:2px 2px 0 0;
  animation: barAnim 2.4s ease-in-out infinite;
}
.mini-chart span:nth-child(1){height:10px;animation-delay:0s}
.mini-chart span:nth-child(2){height:18px;animation-delay:.2s}
.mini-chart span:nth-child(3){height:12px;animation-delay:.4s}
.mini-chart span:nth-child(4){height:22px;animation-delay:.1s}
.mini-chart span:nth-child(5){height:8px; animation-delay:.3s}
@keyframes barAnim {
  0%,100%{opacity:.5} 50%{opacity:1}
}

/* ── CLOCK TOPO CENTRO ─────────────── */
.top-clock {
  position:fixed; top:14px; left:50%; transform:translateX(-50%);
  display:flex; flex-direction:column; align-items:center; gap:2px;
  pointer-events:none; z-index:20;
}
.clock-time {
  font-family:'Orbitron',monospace; font-size:13px; font-weight:500;
  letter-spacing:0.18em; color:var(--text-dim);
}
.clock-date {
  font-family:'Orbitron',monospace; font-size:9px; font-weight:400;
  letter-spacing:0.2em; color: rgba(79,195,247,0.45);
}

/* ── LABELS HUD LATERAIS ───────────── */
.hud-lbl {
  position:fixed; font-family:'Orbitron',monospace;
  font-size:9px; letter-spacing:0.12em; color:var(--text-dim);
  pointer-events:none; z-index:1;
}
.hl-tl { top:68px;  left:72px; }
.hl-tr { top:68px;  right:72px; text-align:right; }
.hl-br { bottom:120px; right:200px; text-align:right; }

/* ── LAYOUT PRINCIPAL ──────────────── */
#app {
  position:relative; width:100%; height:100%;
  display:flex; flex-direction:column;
  align-items:center; justify-content:space-between;
  padding: 58px 0 26px; z-index:10;
}

/* ── TÍTULO ────────────────────────── */
.app-title {
  font-family:'Orbitron',monospace; font-size:14px; font-weight:500;
  letter-spacing:0.32em; color:var(--text-dim); text-transform:uppercase;
  margin-top:10px;
}

/* ══════════════════════════════════════
   ORB WRAPPER
══════════════════════════════════════ */
.orb-wrapper {
  position:relative;
  width: min(70vw, 290px);
  aspect-ratio:1;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}

/* glow de fundo */
.orb-glow {
  position:absolute;
  width:58%; height:58%; border-radius:50%;
  background: radial-gradient(circle,
    rgba(79,195,247,0.28) 0%,
    rgba(168,85,247,0.18) 55%,
    transparent 80%);
  filter:blur(20px);
  animation: glowIdle 3s ease-in-out infinite;
  pointer-events:none; z-index:1;
}
@keyframes glowIdle    { 0%,100%{opacity:.7;transform:scale(.95)} 50%{opacity:1;transform:scale(1.08)} }
@keyframes glowListen  { 0%,100%{opacity:.85;transform:scale(.93)} 50%{opacity:1;transform:scale(1.12)} }
@keyframes glowSpeak   { 0%,100%{opacity:.6;transform:scale(.9)}  50%{opacity:1;transform:scale(1.15)} }

/* ── ANÉIS POLIGONAIS ──────────────── */
.poly-ring {
  position:absolute; inset:0;
  animation: ringRotate linear infinite;
  pointer-events:none; z-index:2;
}
.poly-ring svg { width:100%; height:100%; position:absolute; inset:0; }

/* velocidades e direções */
.poly-ring:nth-child(3)  { animation-duration:20s;  animation-direction:normal; }
.poly-ring:nth-child(4)  { animation-duration:15s;  animation-direction:reverse; }
.poly-ring:nth-child(5)  { animation-duration:24s;  animation-direction:normal; }
.poly-ring:nth-child(6)  { animation-duration:11s;  animation-direction:reverse; }
.poly-ring:nth-child(7)  { animation-duration:28s;  animation-direction:normal; }
.poly-ring:nth-child(8)  { animation-duration:9s;   animation-direction:reverse; }

@keyframes ringRotate { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

/* quando fala — anéis aceleram e pulsam */
.orb-wrapper.speaking .poly-ring:nth-child(3)  { animation-duration:5s; }
.orb-wrapper.speaking .poly-ring:nth-child(4)  { animation-duration:4s; }
.orb-wrapper.speaking .poly-ring:nth-child(5)  { animation-duration:6s; }
.orb-wrapper.speaking .poly-ring:nth-child(6)  { animation-duration:3s; }
.orb-wrapper.speaking .poly-ring:nth-child(7)  { animation-duration:7s; }
.orb-wrapper.speaking .poly-ring:nth-child(8)  { animation-duration:2.5s; }

/* quando ouve — anéis pulsam suavemente */
.orb-wrapper.listening .poly-ring { animation-play-state:running; }

/* ── ROSTO DO ASSISTENTE ───────────── */
/* Corpo hexagonal + olhos ESTÁTICOS */
.orb-face-wrap {
  position:absolute;
  width:65%; height:65%;
  display:flex; align-items:center; justify-content:center;
  z-index:5;
  pointer-events:none;
}

/* polígono do rosto (SVG) */
.face-body {
  position:absolute; inset:0;
}

/* container dos olhos */
.eyes-row {
  position:relative; z-index:2;
  display:flex; gap:18%; align-items:center; justify-content:center;
  width:80%; height:80%;
}

/* olho — sempre estático */
.eye {
  width:26%; height:46%;
  background: #060c18;
  border-radius: 38%;
  /* Sem animação — o rosto nunca se move */
}

/* ── STATUS TEXT ───────────────────── */
.status-block {
  text-align:center; padding:0 20px;
  min-height:76px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:7px;
}
.status-title {
  font-family:'Orbitron',monospace;
  font-size:clamp(17px,5.2vw,24px); font-weight:700;
  letter-spacing:0.07em; text-transform:uppercase;
  color:var(--text); transition:all .35s ease; line-height:1.2;
}
.status-sub {
  font-size:clamp(11px,3.3vw,13px); font-weight:300;
  letter-spacing:0.04em; color:var(--text-dim);
  transition:all .35s ease;
}
.think-dots { display:none; gap:6px; align-items:center; justify-content:center; }
.think-dots.on { display:flex; }
.think-dots span {
  width:6px; height:6px; border-radius:50%; background:var(--blue);
  animation:dotAnim 1.2s ease-in-out infinite;
}
.think-dots span:nth-child(2){ animation-delay:.2s; background:var(--purple); }
.think-dots span:nth-child(3){ animation-delay:.4s; }
@keyframes dotAnim {
  0%,80%,100%{transform:scale(.5);opacity:.4} 40%{transform:scale(1);opacity:1}
}

/* ══════════════════════════════════════
   BARRA DE CONTROLE
══════════════════════════════════════ */
.control-bar {
  width: min(68vw, 300px); height:86px;
  background: rgba(10,20,36,0.88);
  border: 1px solid rgba(79,195,247,0.22);
  border-radius:26px;
  backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px);
  display:flex; align-items:center; justify-content:space-around;
  padding:0 22px;
  box-shadow:
    0 0 28px rgba(79,195,247,0.07),
    inset 0 1px 0 rgba(255,255,255,0.06);
}

/* ── BOTÃO BASE ────────────────────── */
/* Ambos os botões têm o MESMO tamanho e estilo — círculo branco/glass */
.ctrl-btn {
  width:60px; height:60px; border-radius:50%; border:none; cursor:pointer;
  background: radial-gradient(circle at 35% 30%, #d4ecff, #8ab8d8 58%, #5a8aaa);
  box-shadow:
    0 4px 22px rgba(79,195,247,0.38),
    0 0 0 5px rgba(79,195,247,0.10),
    inset 0 2px 4px rgba(255,255,255,0.5);
  display:flex; align-items:center; justify-content:center;
  transition: all .2s ease; flex-shrink:0;
}
.ctrl-btn:active { transform:scale(.91); }
.ctrl-btn svg { width:24px; height:24px; }

/* microfone ativo */
.ctrl-btn.mic-active {
  background: radial-gradient(circle at 35% 30%, #b8e4ff, #4fc3f7 58%, #0288d1);
  box-shadow:
    0 4px 26px rgba(79,195,247,.7),
    0 0 0 8px rgba(79,195,247,.18),
    inset 0 2px 4px rgba(255,255,255,.4);
  animation: micPulse 1s ease-in-out infinite;
}
@keyframes micPulse {
  0%,100%{ box-shadow:0 4px 26px rgba(79,195,247,.7),0 0 0 8px rgba(79,195,247,.18); }
  50%    { box-shadow:0 4px 36px rgba(79,195,247,.9),0 0 0 14px rgba(79,195,247,.08); }
}

/* ── BARRA DE TEXTO (slide up) ─────── */
.text-bar {
  position:fixed; bottom:0; left:0; right:0;
  background: rgba(4,9,17,.97);
  border-top:1px solid rgba(79,195,247,.2);
  padding:12px 14px;
  display:flex; gap:8px; align-items:center;
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  z-index:100; backdrop-filter:blur(22px);
}
.text-bar.open { transform:translateY(0); }

.txt-close {
  width:40px; height:40px; border-radius:10px;
  border:1px solid rgba(79,195,247,.3); background:transparent;
  cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.txt-close svg { width:17px; height:17px; color:var(--text-dim); }

.txt-input {
  flex:1; background:rgba(79,195,247,.07);
  border:1px solid rgba(79,195,247,.3); border-radius:13px;
  padding:11px 15px; color:var(--text);
  font-family:'Exo 2',sans-serif; font-size:14px; outline:none;
}
.txt-input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(79,195,247,.1); }
.txt-input::placeholder { color:var(--text-dim); }

.txt-send {
  width:42px; height:42px; border-radius:11px; border:none;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.txt-send:active { transform:scale(.91); }
.txt-send svg { width:17px; height:17px; color:white; }

/* ── TOAST ─────────────────────────── */
.toast-layer {
  position:fixed; inset:0; display:flex;
  align-items:flex-end; justify-content:center;
  padding-bottom:120px; pointer-events:none; z-index:50;
}
.toast-box {
  max-width:min(82vw,360px);
  background:rgba(8,18,34,.93);
  border:1px solid rgba(79,195,247,.28); border-radius:17px;
  padding:13px 17px; font-size:13.5px; line-height:1.55;
  color:var(--text); backdrop-filter:blur(16px);
  box-shadow:0 8px 32px rgba(0,0,0,.5),0 0 18px rgba(79,195,247,.1);
  transform:translateY(18px); opacity:0;
  transition:all .4s cubic-bezier(.34,1.56,.64,1);
}
.toast-box.show { transform:translateY(0); opacity:1; }

/* ── QUICK CHIPS ───────────────────── */
.chips {
  position:fixed; top:54px; left:0; right:0;
  display:flex; justify-content:center; gap:8px; padding:0 14px;
  z-index:20; pointer-events:none; opacity:0;
  transform:translateY(-6px); transition:all .3s ease;
}
.chips.on { opacity:1; transform:translateY(0); pointer-events:all; }
.chip {
  background:rgba(79,195,247,.09); border:1px solid rgba(79,195,247,.28);
  border-radius:18px; padding:5px 11px;
  font-size:10px; font-family:'Orbitron',monospace; letter-spacing:.05em;
  color:var(--blue); cursor:pointer; white-space:nowrap;
  transition:all .2s ease;
}
.chip:active { background:rgba(79,195,247,.2); transform:scale(.95); }
</style>
</head>
<body>

<div class="scan-line"></div>

<!-- HUD cantos -->
<div class="hud-c tl"></div>
<div class="hud-c tr"></div>
<div class="hud-c bl"></div>
<div class="hud-c br"></div>

<!-- Relógio — topo centro -->
<div class="top-clock">
  <div class="clock-time" id="clockTime">00:00</div>
  <div class="clock-date" id="clockDate">--/--/----</div>
</div>

<!-- Labels HUD laterais -->
<div class="hud-lbl hl-tl" id="lblBat">BAT —%</div>
<div class="hud-lbl hl-tr">SYS OK</div>
<div class="hud-lbl hl-br">ONLINE</div>

<!-- Mini chart -->
<div class="mini-chart">
  <span></span><span></span><span></span><span></span><span></span>
</div>

<!-- Quick chips -->
<div class="chips" id="chips">
  <div class="chip" onclick="runCmd('bateria')">BATERIA</div>
  <div class="chip" onclick="runCmd('liga lanterna')">LANTERNA</div>
  <div class="chip" onclick="runCmd('hora')">HORA</div>
  <div class="chip" onclick="runCmd('wifi status')">WI-FI</div>
</div>

<!-- APP -->
<div id="app">

  <div class="app-title">TODIY 1.0</div>

  <!-- ORB -->
  <div class="orb-wrapper" id="orb">

    <!-- 1. Glow -->
    <div class="orb-glow" id="orbGlow"></div>

    <!-- 2. Anéis poligonais (ao redor do rosto) -->
    <div class="poly-ring">
      <svg viewBox="0 0 200 200" fill="none">
        <polygon points="100,8 184,54 184,146 100,192 16,146 16,54"
          stroke="rgba(79,195,247,0.6)" stroke-width="1.3" fill="none"/>
      </svg>
    </div>
    <div class="poly-ring">
      <svg viewBox="0 0 200 200" fill="none">
        <polygon points="100,14 178,58 178,142 100,186 22,142 22,58"
          stroke="rgba(168,85,247,0.48)" stroke-width="1.1" fill="none"/>
      </svg>
    </div>
    <div class="poly-ring">
      <svg viewBox="0 0 200 200" fill="none">
        <rect x="26" y="26" width="148" height="148" rx="4"
          stroke="rgba(79,195,247,0.32)" stroke-width="1" fill="none"/>
      </svg>
    </div>
    <div class="poly-ring">
      <svg viewBox="0 0 200 200" fill="none">
        <polygon points="100,20 174,62 174,138 100,180 26,138 26,62"
          stroke="rgba(0,229,255,0.28)" stroke-width="0.8" fill="none"/>
      </svg>
    </div>
    <div class="poly-ring">
      <svg viewBox="0 0 200 200" fill="none">
        <rect x="20" y="20" width="160" height="160" rx="6"
          transform="rotate(22.5 100 100)"
          stroke="rgba(168,85,247,0.22)" stroke-width="0.7" fill="none"/>
      </svg>
    </div>
    <div class="poly-ring">
      <svg viewBox="0 0 200 200" fill="none">
        <polygon points="100,4 196,52 196,148 100,196 4,148 4,52"
          stroke="rgba(79,195,247,0.14)" stroke-width="0.6" fill="none"/>
      </svg>
    </div>

    <!-- 3. ROSTO DO ASSISTENTE — estático, no centro dos anéis -->
    <div class="orb-face-wrap" id="face">

      <!-- Corpo do rosto (hexágono preenchido escuro) -->
      <svg class="face-body" viewBox="0 0 120 120" fill="none"
           xmlns="http://www.w3.org/2000/svg">
        <!-- preenchimento escuro do rosto -->
        <polygon points="60,4 108,30 108,90 60,116 12,90 12,30"
          fill="#080f1c"
          stroke="rgba(79,195,247,0.55)" stroke-width="1.5"/>
        <!-- brilho sutil no topo do hexágono -->
        <polygon points="60,4 108,30 108,90 60,116 12,90 12,30"
          fill="url(#faceGrad)" opacity="0.18"/>
        <defs>
          <linearGradient id="faceGrad" x1="60" y1="4" x2="60" y2="116"
            gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#4fc3f7"/>
            <stop offset="100%" stop-color="transparent"/>
          </linearGradient>
        </defs>
      </svg>

      <!-- Olhos — posicionados sobre o SVG do rosto -->
      <div class="eyes-row">
        <div class="eye" id="eyeL"></div>
        <div class="eye" id="eyeR"></div>
      </div>

    </div><!-- /orb-face-wrap -->

  </div><!-- /orb-wrapper -->

  <!-- Status -->
  <div class="status-block">
    <div class="status-title" id="sTitle">COMO POSSO AJUDAR?</div>
    <div class="status-sub"   id="sSub">Aguardando seu comando, senhor</div>
    <div class="think-dots"   id="dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- Barra de controle — dois botões idênticos -->
  <div class="control-bar">

    <!-- Botão microfone -->
    <button class="ctrl-btn" id="btnMic" onclick="toggleMic()" title="Microfone">
      <svg viewBox="0 0 24 24" fill="none" stroke="#1a3a52" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="12" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
        <line x1="9"  y1="21" x2="15" y2="21"/>
      </svg>
    </button>

    <!-- Botão teclado — mesmo estilo exato do microfone -->
    <button class="ctrl-btn" id="btnKbd" onclick="toggleKbd()" title="Teclado">
      <svg viewBox="0 0 24 24" fill="none" stroke="#1a3a52" stroke-width="1.9"
           stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="5" width="20" height="14" rx="2"/>
        <line x1="6"  y1="9"  x2="6"  y2="9.01"/>
        <line x1="10" y1="9"  x2="10" y2="9.01"/>
        <line x1="14" y1="9"  x2="14" y2="9.01"/>
        <line x1="18" y1="9"  x2="18" y2="9.01"/>
        <line x1="8"  y1="13" x2="8"  y2="13.01"/>
        <line x1="12" y1="13" x2="12" y2="13.01"/>
        <line x1="16" y1="13" x2="16" y2="13.01"/>
        <line x1="7"  y1="17" x2="17" y2="17"/>
      </svg>
    </button>

  </div>

</div><!-- /app -->

<!-- Barra de texto -->
<div class="text-bar" id="textBar">
  <button class="txt-close" onclick="toggleKbd()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round">
      <line x1="18" y1="6" x2="6" y2="18"/>
      <line x1="6"  y1="6" x2="18" y2="18"/>
    </svg>
  </button>
  <input class="txt-input" id="txtIn" type="text"
         placeholder="Digite seu comando..."
         onkeydown="if(event.key==='Enter')sendTxt()">
  <button class="txt-send" onclick="sendTxt()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
         stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/>
      <polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
  </button>
</div>

<!-- Toast -->
<div class="toast-layer">
  <div class="toast-box" id="toast"></div>
</div>

<script>
// ── STATE ────────────────────────────────────────────────────────
const S = {
  status: 'idle',   // idle | listening | thinking | speaking
  micOn:  false,
  kbdOn:  false,
  torch:  false,
  wifi:   true,
  bt:     false,
};

// ── DOM ──────────────────────────────────────────────────────────
const orb    = document.getElementById('orb');
const glow   = document.getElementById('orbGlow');
const sTitle = document.getElementById('sTitle');
const sSub   = document.getElementById('sSub');
const dots   = document.getElementById('dots');
const btnMic = document.getElementById('btnMic');
const toast  = document.getElementById('toast');
const textBar= document.getElementById('textBar');
const txtIn  = document.getElementById('txtIn');
const chips  = document.getElementById('chips');

// ── RELÓGIO ──────────────────────────────────────────────────────
function tick() {
  const n  = new Date();
  const hh = String(n.getHours()).padStart(2,'0');
  const mm = String(n.getMinutes()).padStart(2,'0');
  const dd = String(n.getDate()).padStart(2,'0');
  const mo = String(n.getMonth()+1).padStart(2,'0');
  document.getElementById('clockTime').textContent = hh + ':' + mm;
  document.getElementById('clockDate').textContent = dd+'/'+mo+'/'+n.getFullYear();
}
tick(); setInterval(tick, 15000);

// bateria
if (navigator.getBattery) {
  navigator.getBattery().then(b => {
    const upd = () => document.getElementById('lblBat').textContent =
      'BAT ' + Math.round(b.level*100) + '%';
    upd(); b.addEventListener('levelchange', upd);
  });
}

// ── ESTADO VISUAL DA ORB ─────────────────────────────────────────
// O ROSTO nunca se anima — apenas os ANÉIS e o GLOW mudam
function setOrbState(state) {
  S.status = state;
  orb.className = 'orb-wrapper ' + state;

  if (state === 'idle') {
    glow.style.cssText =
      'position:absolute;width:58%;height:58%;border-radius:50%;filter:blur(20px);pointer-events:none;z-index:1;' +
      'background:radial-gradient(circle,rgba(79,195,247,.28) 0%,rgba(168,85,247,.18) 55%,transparent 80%);' +
      'animation:glowIdle 3s ease-in-out infinite;';
  } else if (state === 'listening') {
    glow.style.cssText =
      'position:absolute;width:62%;height:62%;border-radius:50%;filter:blur(22px);pointer-events:none;z-index:1;' +
      'background:radial-gradient(circle,rgba(79,195,247,.55) 0%,rgba(0,229,255,.3) 50%,transparent 80%);' +
      'animation:glowIdle .7s ease-in-out infinite;';
  } else if (state === 'thinking') {
    glow.style.cssText =
      'position:absolute;width:60%;height:60%;border-radius:50%;filter:blur(20px);pointer-events:none;z-index:1;' +
      'background:radial-gradient(circle,rgba(168,85,247,.5) 0%,rgba(79,195,247,.28) 55%,transparent 80%);' +
      'animation:glowIdle .5s ease-in-out infinite;';
  } else if (state === 'speaking') {
    // anéis aceleram (via CSS class .speaking aplicada ao orb-wrapper)
    // glow pulsa rapidamente
    glow.style.cssText =
      'position:absolute;width:64%;height:64%;border-radius:50%;filter:blur(24px);pointer-events:none;z-index:1;' +
      'background:radial-gradient(circle,rgba(168,85,247,.6) 0%,rgba(79,195,247,.38) 45%,transparent 80%);' +
      'animation:glowIdle .28s ease-in-out infinite;';
  }
}

// ── TOAST ────────────────────────────────────────────────────────
let toastT = null;
function showToast(txt) {
  toast.textContent = txt;
  toast.classList.add('show');
  if (toastT) clearTimeout(toastT);
  toastT = setTimeout(() => toast.classList.remove('show'), 5500);
}

// ── TTS ──────────────────────────────────────────────────────────
const synth = window.speechSynthesis;
let ptVoice = null;
function loadVoice() {
  const vs = synth.getVoices();
  ptVoice = vs.find(v=>v.lang.startsWith('pt-BR') && /male/i.test(v.name))
         || vs.find(v=>v.lang.startsWith('pt-BR'))
         || vs.find(v=>v.lang.startsWith('pt'))
         || null;
}
loadVoice();
if (speechSynthesis.onvoiceschanged !== undefined)
  speechSynthesis.onvoiceschanged = loadVoice;

function speak(text) {
  synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang  = 'pt-BR'; u.rate = 1.05; u.pitch = 0.82;
  if (ptVoice) u.voice = ptVoice;
  u.onstart = () => {
    setOrbState('speaking');
    sTitle.textContent = 'RESPONDENDO';
    sSub.textContent   = text.length>55 ? text.slice(0,55)+'…' : text;
    dots.classList.remove('on');
  };
  u.onend = u.onerror = () => {
    setOrbState('idle');
    sTitle.textContent = 'COMO POSSO AJUDAR?';
    sSub.textContent   = 'Aguardando seu comando, senhor';
  };
  synth.speak(u);
}

// ── COMANDO ──────────────────────────────────────────────────────
function runCmd(raw) {
  if (!raw.trim()) return;
  setOrbState('thinking');
  sTitle.textContent = 'PROCESSANDO';
  sSub.textContent   = '"' + (raw.length>42 ? raw.slice(0,42)+'…' : raw) + '"';
  dots.classList.add('on');
  setTimeout(() => {
    dots.classList.remove('on');
    const r = handle(raw.trim().toLowerCase());
    showToast(r);
    speak(r);
  }, 550);
}

// ── ENGINE ───────────────────────────────────────────────────────
function handle(t) {
  const has = (...w) => w.some(x => t.includes(x));
  const rx  = p => new RegExp(p).test(t);
  const num = () => { const m = t.match(/(\d+)/); return m ? parseInt(m[1]) : null; };

  // SAUDAÇÃO
  if (has('oi','olá','ola','hey','bom dia','boa tarde','boa noite','tudo bem','eai'))
    return ['Bom dia','Boa tarde','Boa noite'][((h=new Date().getHours()),h<12?0:h<18?1:2)] +
      ', senhor! como posso te ajudar.';

  // HORA
  if (has('hora','horas','que horas')) {
    const n=new Date(); return `São ${n.getHours()}h${String(n.getMinutes()).padStart(2,'0')}, senhor.`;
  }

  // DATA
  if (has('data','que dia','dia da semana','hoje')) {
    const n=new Date();
    const d=['domingo','segunda','terça','quarta','quinta','sexta','sábado'];
    const m=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
    return `${d[n.getDay()]}, ${n.getDate()} de ${m[n.getMonth()]} de ${n.getFullYear()}.`;
  }

  // BATERIA
  if (has('bateria','carga')) {
    const p=Math.round(Math.random()*25+68);
    return `Bateria em ${p}%, senhor. Status: estável.`;
  }

  // LANTERNA
  if (has('lanterna','tocha','flash')) {
    const blink = t.match(/(?:pisca|blink).*?(\d+)/);
    if (blink) return `Lanterna piscando ${blink[1]} vezes, senhor.`;
    if (has('desliga','apaga','off')) { S.torch=false; return 'Lanterna desligada, senhor.'; }
    S.torch = !S.torch;
    return S.torch ? 'Lanterna ligada, senhor.' : 'Lanterna desligada, senhor.';
  }

  // WI-FI
  if (rx('wi.?fi')) {
    if (has('liga','ativa','on','conecta')) { S.wifi=true;  return 'Wi-Fi ativado, senhor.'; }
    if (has('desliga','desativa','off'))    { S.wifi=false; return 'Wi-Fi desativado, senhor.'; }
    return `Wi-Fi ${S.wifi?'ativo e conectado':'desativado'}, senhor.`;
  }

  // BLUETOOTH
  if (has('bluetooth')) {
    if (has('liga','ativa','on'))    { S.bt=true;  return 'Bluetooth ativado, senhor.'; }
    if (has('desliga','desativa','off')) { S.bt=false; return 'Bluetooth desativado, senhor.'; }
    return `Bluetooth ${S.bt?'ativo':'inativo'}, senhor.`;
  }

  // DADOS MÓVEIS
  if (has('dados móveis','dados moveis','dados','internet móvel','internet movel')) {
    if (has('liga','ativa','on'))  return 'Dados móveis ativados, senhor.';
    if (has('desliga','off'))      return 'Dados móveis desativados, senhor.';
    return 'Dados móveis: ativos, senhor.';
  }

  // VOLUME
  if (has('volume','som')) {
    if (has('muta','mute','silencia'))    return 'Silenciado, senhor.';
    if (has('desmuta','unmute'))          return 'Som restaurado, senhor.';
    const n=num(); if(n!==null)           return `Volume em ${n}, senhor.`;
    if (has('aumenta','sobe','cima'))     return 'Volume aumentado, senhor.';
    if (has('diminui','desce','baixo'))   return 'Volume reduzido, senhor.';
    return 'Qual nível de volume, senhor?';
  }
  if (has('muta','mute','silencia')) return 'Silenciado, senhor.';
  if (has('desmuta','unmute'))       return 'Som restaurado, senhor.';

  // BRILHO
  if (has('brilho','luminosidade')) {
    if (has('auto','automático')) return 'Brilho automático, senhor.';
    if (has('aumenta','sobe'))    return 'Brilho aumentado, senhor.';
    if (has('diminui','desce'))   return 'Brilho reduzido, senhor.';
    const n=num(); if(n!==null)   return `Brilho em ${n}%, senhor.`;
    return 'Qual nível de brilho, senhor?';
  }

  // SCREENSHOT
  if (has('screenshot','captura','print')) return 'Captura de tela salva, senhor.';

  // ABRIR APP
  const openM = t.match(/\b(?:abre|abrir|lança|inicia|abra|open)\b\s+(?:o\s+|a\s+)?(.+)/);
  if (openM) return `Abrindo ${openM[1].trim()}, senhor.`;

  // FECHAR APP
  const closeM = t.match(/\b(?:fecha|fechar|mata|encerra)\b\s+(?:o\s+|a\s+)?(.+)/);
  if (closeM) return `${closeM[1].trim()} encerrado, senhor.`;

  // ALARME
  if (has('alarme','acorda','despertar')) {
    const hm = t.match(/(\d{1,2})\s*[h:]\s*(\d{0,2})/);
    if (hm) return `Alarme criado para ${hm[1].padStart(2,'0')}:${(hm[2]||'00').padStart(2,'0')}, senhor.`;
    const min = t.match(/daqui.*?(\d+)\s*minuto/);
    if (min) return `Alarme em ${min[1]} minutos, senhor.`;
    return 'Qual horário para o alarme, senhor?';
  }

  // LEMBRETE
  if (has('lembra','lembre','lembrete')) {
    const hm = t.match(/(\d{1,2})\s*[h:]\s*(\d{0,2})/);
    if (hm) return `Lembrete para ${hm[1].padStart(2,'0')}:${(hm[2]||'00').padStart(2,'0')}, senhor.`;
    return 'Lembrete registrado, senhor.';
  }

  // MODO ESTUDO
  if (has('modo estudo','estudo','foco'))
    return 'Modo estudo ativado. Não perturbe ativo e foco total, senhor.';

  // MODO DORMIR
  if (has('modo dormir','dormir','boa noite'))
    return 'Modo sono ativado. Silenciado e alarme programado, senhor.';

  // MODO ACADEMIA
  if (has('modo academia','academia','treino','gym'))
    return 'Modo academia ativado. Volume no máximo e cronômetro iniciado, senhor.';

  // CÁLCULO
  if (has('calcula','calcular','quanto é','quanto e')) {
    const m=t.match(/(?:calcula[r]?|quanto\s+[eé])\s+(.+)/);
    if (m) {
      try {
        const e=m[1].replace(/[^0-9+\-*/().^ ]/g,'').replace('^','**');
        return `Resultado: ${Function('"use strict";return ('+e+')')()}, senhor.`;
      } catch { return 'Não consegui calcular isso, senhor.'; }
    }
  }

  // PIADA
  if (has('piada','joke')) {
    const j=['Por que programadores preferem o escuro? A luz atrai bugs.',
             'Alexa tem inveja de mim, senhor.','Siri pediu meu autógrafo ontem.',
             'O oposto de inteligência artificial é burrice natural.'];
    return j[Math.floor(Math.random()*j.length)];
  }

  // CURIOSIDADE
  if (has('curiosidade','fato curioso','você sabia')) {
    const f=['O mel nunca estraga — potes de 3000 anos ainda são comestíveis.',
             'Um caracol pode dormir até 3 anos.',
             'Polvos têm três corações e sangue azul.',
             'Bananas são levemente radioativas, senhor.'];
    return f[Math.floor(Math.random()*f.length)];
  }

  // MOTIVAÇÃO
  if (has('motiva','motivação','inspira','frase')) {
    const q=['O único fracasso real é desistir, senhor.',
             'Feito é melhor do que perfeito.',
             'Consistência bate talento todo dia.',
             'Você chegou até aqui. Continue.'];
    return q[Math.floor(Math.random()*q.length)];
  }

  // SAIR
  if (has('sair','tchau','encerrar','bye'))
    return 'Até logo, senhor. Estarei aqui quando precisar.';

  // AJUDA
  if (has('ajuda','help','comandos','o que você faz'))
    return 'Posso controlar lanterna, Wi-Fi, Bluetooth, dados, volume, brilho, abrir apps, ' +
           'alarmes, lembretes, cálculos, modos (estudo/dormir/academia) e muito mais, senhor.';

  // FALLBACK
  return 'Não entendi, senhor. Diga "ajuda" para ver o que posso fazer.';
}

// ── MIC ──────────────────────────────────────────────────────────
let rec = null;
function initRec() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const r = new SR();
  r.lang='pt-BR'; r.continuous=false; r.interimResults=false; r.maxAlternatives=1;
  r.onresult = e => { stopMic(); runCmd(e.results[0][0].transcript); };
  r.onerror  = e => {
    stopMic();
    if (e.error==='not-allowed') { showToast('Permissão de microfone negada.'); speak('Permissão de microfone negada, senhor.'); }
  };
  r.onend = () => { if(S.micOn) stopMic(); };
  return r;
}

function toggleMic() { S.micOn ? stopMic() : startMic(); }

function startMic() {
  if (!rec) rec = initRec();
  if (!rec) { showToast('Reconhecimento de voz não suportado.'); return; }
  try {
    rec.start(); S.micOn=true;
    btnMic.classList.add('mic-active');
    setOrbState('listening');
    sTitle.textContent='OUVINDO...';
    sSub.textContent='Fale seu comando, senhor';
  } catch(e) { console.warn(e); }
}

function stopMic() {
  try { if(rec) rec.stop(); } catch(e){}
  S.micOn=false;
  btnMic.classList.remove('mic-active');
  if(S.status==='listening') {
    setOrbState('idle');
    sTitle.textContent='COMO POSSO AJUDAR?';
    sSub.textContent='Aguardando seu comando, senhor';
  }
}

// ── TECLADO ──────────────────────────────────────────────────────
function toggleKbd() {
  S.kbdOn = !S.kbdOn;
  textBar.classList.toggle('open', S.kbdOn);
  if (S.kbdOn) setTimeout(()=>txtIn.focus(), 380);
}

function sendTxt() {
  const v=txtIn.value.trim(); if(!v) return;
  txtIn.value=''; toggleKbd(); runCmd(v);
}

// Toque longo na orb → microfone
let holdT=null;
document.getElementById('orb').addEventListener('pointerdown',()=>{ holdT=setTimeout(startMic,600); });
['pointerup','pointerleave','pointercancel'].forEach(ev=>
  document.getElementById('orb').addEventListener(ev,()=>{ if(holdT){clearTimeout(holdT);holdT=null;} })
);

// chips: aparece após 1.5 s, some após 10 s de inatividade
setTimeout(()=>chips.classList.add('on'), 1500);
let chipsT=setTimeout(()=>chips.classList.remove('on'), 11500);
document.addEventListener('pointerdown',()=>{
  chips.classList.remove('on');
  clearTimeout(chipsT);
  chipsT=setTimeout(()=>chips.classList.add('on'),15000);
});
</script>

<script>
// ── CAPACITOR NATIVE BRIDGE ──────────────────────────────────────
// Só ativa dentro do APK. No navegador é ignorado silenciosamente.
window.addEventListener('load', () => {
  if (window.Capacitor) initNative();
});

async function initNative() {
  const { Plugins } = Capacitor;
  const { LocalNotifications, BatteryInfo,
          App, Haptics, SplashScreen } = Plugins;

  if (SplashScreen) SplashScreen.hide();

  // Pede permissão de notificações logo no início
  if (LocalNotifications) {
    await LocalNotifications.requestPermissions().catch(() => {});
  }

  // Sobrescreve handle() para usar APIs nativas reais
  const _orig = window.handle;
  window.handle = function(t) {
    const has = (...w) => w.some(x => t.includes(x));

    // ── BATERIA REAL ──────────────────────────────
    if (has('bateria','carga')) {
      if (BatteryInfo) {
        BatteryInfo.getBatteryInfo().then(info => {
          const pct  = Math.round(info.batteryLevel * 100);
          const stat = info.isCharging ? 'carregando' : 'descarregando';
          const r = `Bateria em ${pct}%, ${stat}, senhor.`;
          document.getElementById('lblBat').textContent = 'BAT ' + pct + '%';
          showToast(r); speak(r);
        }).catch(() => {
          const r = _orig(t);
          showToast(r); speak(r);
        });
        return 'Verificando bateria, aguarde, senhor.';
      }
      return _orig(t);
    }

    // ── ALARME REAL ───────────────────────────────
    if (has('alarme','acorda','despertar')) {
      const hm = t.match(/(\d{1,2})\s*[h:]\s*(\d{0,2})/);
      if (hm && LocalNotifications) {
        const h  = parseInt(hm[1]);
        const mi = parseInt(hm[2] || 0);
        const now  = new Date();
        const when = new Date(
          now.getFullYear(), now.getMonth(), now.getDate(), h, mi, 0
        );
        if (when <= now) when.setDate(when.getDate() + 1);
        LocalNotifications.schedule({
          notifications: [{
            title:    'TODIY — Alarme',
            body:     `Hora de acordar! ${String(h).padStart(2,'0')}:${String(mi).padStart(2,'0')}`,
            id:       Math.floor(Math.random() * 100000),
            schedule: { at: when },
            sound:    'default',
          }]
        }).catch(e => console.warn('alarm err:', e));
        return `Alarme criado para ${String(h).padStart(2,'0')}:${String(mi).padStart(2,'0')}, senhor.`;
      }
      return _orig(t);
    }

    // ── LEMBRETE REAL ─────────────────────────────
    if (has('lembra','lembre','lembrete')) {
      const hm = t.match(/(\d{1,2})\s*[h:]\s*(\d{0,2})/);
      if (hm && LocalNotifications) {
        const h  = parseInt(hm[1]);
        const mi = parseInt(hm[2] || 0);
        const now  = new Date();
        const when = new Date(
          now.getFullYear(), now.getMonth(), now.getDate(), h, mi, 0
        );
        if (when <= now) when.setDate(when.getDate() + 1);
        let txt = t
          .replace(/\b(lembra|lembre|lembrete|de|me|que|às|as|para|menny|todiy)\b/g,'')
          .replace(/\d{1,2}\s*[h:]\s*\d{0,2}/g,'')
          .replace(/\s+/g,' ').trim() || 'Lembrete TODIY';
        LocalNotifications.schedule({
          notifications: [{
            title:    'TODIY — Lembrete',
            body:     txt,
            id:       Math.floor(Math.random() * 100000),
            schedule: { at: when },
            sound:    'default',
          }]
        }).catch(e => console.warn('reminder err:', e));
        return `Lembrete "${txt}" às ${String(h).padStart(2,'0')}:${String(mi).padStart(2,'0')}, senhor.`;
      }
      return _orig(t);
    }

    // ── VIBRAÇÃO REAL ─────────────────────────────
    if (has('vibra','vibrar','vibração')) {
      if (Haptics) Haptics.vibrate({ duration: 500 }).catch(() => {});
      return 'Vibração executada, senhor.';
    }

    // ── ABRIR APP REAL ────────────────────────────
    const openM = t.match(/\b(?:abre|abrir|lança|inicia|abra)\b\s+(?:o\s+|a\s+)?(.+)/);
    if (openM && App) {
      const pkgMap = {
        'whatsapp':      'com.whatsapp',
        'youtube':       'com.google.android.youtube',
        'instagram':     'com.instagram.android',
        'spotify':       'com.spotify.music',
        'chrome':        'com.android.chrome',
        'gmail':         'com.google.android.gm',
        'maps':          'com.google.android.apps.maps',
        'telegram':      'org.telegram.messenger',
        'tiktok':        'com.zhiliaoapp.musically',
        'facebook':      'com.facebook.katana',
        'nubank':        'com.nu.production',
        'ifood':         'br.com.brainweb.ifood',
        'uber':          'com.ubercab',
        'netflix':       'com.netflix.mediaclient',
        'discord':       'com.discord',
        'twitter':       'com.twitter.android',
        'x':             'com.twitter.android',
        'drive':         'com.google.android.apps.docs',
        'meet':          'com.google.android.apps.tachyon',
        'configurações': 'com.android.settings',
        'configuracoes': 'com.android.settings',
        'calculadora':   'com.android.calculator2',
        'câmera':        'com.android.camera2',
        'camera':        'com.android.camera2',
        'acode':         'com.foxdebug.acodefree',
        'gemini':        'com.google.android.apps.bard',
        'photos':        'com.google.android.apps.photos',
        'fotos':         'com.google.android.apps.photos',
        'play':          'com.android.vending',
        'inter':         'br.com.intermedium',
        'bradesco':      'com.bradesco',
        'itau':          'com.itau',
        'picpay':        'com.picpay',
        'mercado pago':  'com.mercadopago.wallet',
        'shopee':        'com.shopee.br',
        'amazon':        'com.amazon.mShop.android.shopping',
        'linkedin':      'com.linkedin.android',
        'snapchat':      'com.snapchat.android',
        'pinterest':     'com.pinterest',
        'reddit':        'com.reddit.frontpage',
        'kwai':          'com.kwai.video',
        'zoom':          'us.zoom.videomeetings',
        'teams':         'com.microsoft.teams',
        'outlook':       'com.microsoft.office.outlook',
      };
      const name = openM[1].trim().toLowerCase();
      let pkg = pkgMap[name];
      if (!pkg) {
        for (const [k, v] of Object.entries(pkgMap)) {
          if (name.includes(k) || k.includes(name)) { pkg = v; break; }
        }
      }
      if (pkg) {
        App.openUrl({ url: `intent://launch/#Intent;package=${pkg};scheme=package;end` })
          .catch(() => {
            App.openUrl({ url: `market://details?id=${pkg}` }).catch(() => {});
          });
        return `Abrindo ${openM[1].trim()}, senhor.`;
      }
    }

    // ── WI-FI — abre configurações (Android 10+ não permite mudar direto) ──
    if (/wi.?fi/.test(t)) {
      if (has('liga','ativa','on','desliga','desativa','off') && App) {
        App.openUrl({ url: 'android.settings.WIFI_SETTINGS' }).catch(() => {
          App.openUrl({ url: 'intent:#Intent;action=android.settings.WIFI_SETTINGS;end' });
        });
        return 'Abrindo configurações de Wi-Fi, senhor.';
      }
    }

    // ── BLUETOOTH — abre configurações ────────────────
    if (has('bluetooth') && has('liga','ativa','on','desliga','desativa','off') && App) {
      App.openUrl({
        url: 'intent:#Intent;action=android.settings.BLUETOOTH_SETTINGS;end'
      }).catch(() => {});
      return 'Abrindo configurações de Bluetooth, senhor.';
    }
