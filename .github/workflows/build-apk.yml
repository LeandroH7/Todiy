name: Build TODIY APK

# Dispara automaticamente toda vez que você enviar arquivos para o GitHub
on:
  push:
    branches: [ main ]
  workflow_dispatch:   # permite rodar manualmente pelo site do GitHub

jobs:
  build:
    name: Gerar APK
    runs-on: ubuntu-latest

    steps:
      # 1. Baixa o código do repositório
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Configura o Node.js
      - name: Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # 3. Instala dependências (Capacitor e plugins)
      - name: Instalar dependências
        run: npm install

      # 4. Configura Java 17 (necessário para compilar Android)
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version:  '17'

      # 5. Configura o Android SDK
      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      # 6. Instala plataformas Android necessárias
      - name: Instalar Android Build Tools
        run: |
          sdkmanager "platforms;android-34" \
                     "build-tools;34.0.0"   \
                     "platform-tools"

      # 7. Adiciona a plataforma Android ao projeto Capacitor
      - name: Adicionar plataforma Android
        run: npx cap add android

      # 8. Sincroniza os arquivos web (www/) com o projeto Android
      - name: Sincronizar Capacitor
        run: npx cap sync android

      # 9. Dá permissão de execução ao Gradle
      - name: Permissão Gradle
        run: chmod +x android/gradlew

      # 10. Compila o APK
      - name: Compilar APK (debug)
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      # 11. Salva o APK como artefato para download
      - name: Salvar APK
        uses: actions/upload-artifact@v4
        with:
          name: TODIY-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30   # fica disponível por 30 dias
