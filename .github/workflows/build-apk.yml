name: Build TODIY APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Gerar APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar dependências
        run: npm install --legacy-peer-deps

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Tools
        run: |
          sdkmanager "platforms;android-34" \
                     "build-tools;34.0.0"   \
                     "platform-tools"

      - name: Capacitor add android
        run: npx cap add android

      - name: Capacitor sync
        run: npx cap sync android

      # ── PASSO CRÍTICO: injeta todas as permissões necessárias ──
      - name: Injetar permissões no AndroidManifest.xml
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"

          inject() {
            local PERM="$1"
            if ! grep -q "$PERM" "$MANIFEST"; then
              sed -i "s|</manifest>|    <uses-permission android:name=\"$PERM\"/>\n</manifest>|" "$MANIFEST"
              echo "  + $PERM"
            fi
          }

          echo "Injetando permissões..."
          inject "android.permission.CAMERA"
          inject "android.permission.FLASHLIGHT"
          inject "android.permission.RECORD_AUDIO"
          inject "android.permission.MODIFY_AUDIO_SETTINGS"
          inject "android.permission.POST_NOTIFICATIONS"
          inject "android.permission.SCHEDULE_EXACT_ALARM"
          inject "android.permission.USE_EXACT_ALARM"
          inject "android.permission.VIBRATE"
          inject "android.permission.WAKE_LOCK"
          inject "android.permission.RECEIVE_BOOT_COMPLETED"

          # Feature de flash (não obrigatória — permite instalar sem câmera de flash)
          if ! grep -q "camera.flash" "$MANIFEST"; then
            sed -i "s|</manifest>|    <uses-feature android:name=\"android.hardware.camera.flash\" android:required=\"false\"/>\n</manifest>|" "$MANIFEST"
            echo "  + camera.flash feature"
          fi

          echo "Manifest final:"
          cat "$MANIFEST"

      - name: Permissão Gradle
        run: chmod +x android/gradlew

      - name: Compilar APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Salvar APK
        uses: actions/upload-artifact@v4
        with:
          name: TODIY-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
