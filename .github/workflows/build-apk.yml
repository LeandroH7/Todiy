name: Build TODIY APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Gerar APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Garantir que www/index.html existe
        run: |
          mkdir -p www
          if [ ! -f www/index.html ]; then
            echo "ERRO: www/index.html não encontrado!"
            exit 1
          fi
          echo "www/index.html encontrado ($(wc -c < www/index.html) bytes)"

      - name: Instalar dependências
        run: npm install --legacy-peer-deps

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar Android Build Tools
        run: |
          sdkmanager "platforms;android-34" \
                     "build-tools;34.0.0"   \
                     "platform-tools"

      - name: Adicionar plataforma Android
        run: npx cap add android

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Adicionar permissões ao AndroidManifest.xml
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"

          # Permissão de câmera (lanterna)
          if ! grep -q "android.permission.CAMERA" "$MANIFEST"; then
            sed -i 's|<uses-permission android:name="android.permission.INTERNET"/>|<uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.CAMERA"/>\n    <uses-permission android:name="android.permission.FLASHLIGHT"/>\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM"/>\n    <uses-permission android:name="android.permission.USE_EXACT_ALARM"/>\n    <uses-permission android:name="android.permission.VIBRATE"/>\n    <uses-feature android:name="android.hardware.camera.flash" android:required="false"/>|' "$MANIFEST"
            echo "Permissões adicionadas ao AndroidManifest.xml"
          else
            echo "Permissões já existem"
          fi

      - name: Permissão Gradle
        run: chmod +x android/gradlew

      - name: Compilar APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Salvar APK
        uses: actions/upload-artifact@v4
        with:
          name: TODIY-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
